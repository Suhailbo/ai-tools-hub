    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --text: #f0f0f0;
            --gold: #d4af37;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.8; 
            overflow-x: hidden;
        }

        /* Circular Rotating Background */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(212,175,55,0.06) 0%, transparent 70%);
            overflow: hidden;
        }
        .background::before,
        .background::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            border: 1px solid rgba(212,175,55,0.12);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: rotateCircle 140s linear infinite;
        }
        .background::before {
            width: 800px;
            height: 800px;
            animation-duration: 160s;
        }
        .background::after {
            width: 1200px;
            height: 1200px;
            animation-duration: 220s;
            animation-direction: reverse;
        }

        @keyframes rotateCircle {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        header { 
            background: rgba(10,10,10,0.95); 
            padding: 2rem 6%; 
            border-bottom: 2px solid var(--gold); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            backdrop-filter: blur(8px);
        }
        nav { 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

            display: flex;

            gap: 14px;
            font-size: 2.35rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: -1.2px;
        }
        .logo-dot {
            width: 12px;
            height: 12px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--gold);
        }
        .nav-links a { 
            color: var(--text); 
            margin-left: 2.8rem; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 1.05rem;
        }
        .nav-links a:hover { color: var(--gold); }

        .hero { 
            padding: 8rem 6% 6rem; 
            text-align: center;

        }

        }

        .cta-btn { 
            background: var(--gold); 
            color: #111; 
            padding: 18px 48px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.25rem;

            cursor: pointer; 
            text-decoration: none; 
            display: inline-block; 
            transition: all 0.4s ease;
        }
        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.45);
        }

        .section {

        .section-title {

            color: var(--gold); 
            font-weight: 600;
