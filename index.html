                    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium curation of the world's finest free AI tools in 2026. Sophisticated reviews and guidance for discerning users.">
    <title>AI Tools Hub — Premium AI Intelligence 2026</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --text: #f0f0f0;
            --gold: #d4af37;
            --gold-light: #f0d080;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.8; 
            overflow-x: hidden;
        }

        /* Faint Rotating Background */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(212, 175, 55, 0.06) 0%, transparent 50%);
            z-index: -1;
            animation: rotateBg 180s linear infinite;
            opacity: 0.6;
        }
        .background::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(212,175,55,0.03) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(212,175,55,0.03) 50%, transparent 52%);
            background-size: 80px 80px;
            animation: subtleRotate 120s linear infinite;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes subtleRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        header { 
            background: rgba(10,10,10,0.95); 
            padding: 2rem 6%; 
            border-bottom: 2px solid var(--gold); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            backdrop-filter: blur(10px);
        }
        nav { 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 2.3rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: -1px;
        }
        .logo-dot {
            width: 10px;
            height: 10px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--gold);
        }
        .nav-links a { 
            color: var(--text); 
            margin-left: 2.8rem; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 1.05rem;
            transition: color 0.4s ease;
        }
        .nav-links a:hover { color: var(--gold); }

        .hero { 
            padding: 8rem 6% 6rem; 
            text-align: center; 
            max-width: 1100px; 
            margin: 0 auto; 
            position: relative;
        }
        .hero h1 { 
            font-size: 4.2rem; 
            line-height: 1.1; 
            margin-bottom: 1.8rem; 
            color: white; 
            font-weight: 600;
        }
        .hero p { 
            font-size: 1.5rem; 
            max-width: 780px; 
            margin: 0 auto 3.5rem; 
            opacity: 0.88; 
        }
        .cta-btn { 
            background: var(--gold); 
            color: #111; 
            padding: 18px 48px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.25rem; 
            font-weight: 600; 
            cursor: pointer; 
            text-decoration: none; 
            display: inline-block; 
            transition: all 0.5s ease;
        }
        .cta-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
        }

        .section { 
            padding: 6rem 6%; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        .section-title { 
            text-align: center; 
            font-size: 2.8rem; 
            margin-bottom: 4rem; 
            color: var(--gold); 
            font-weight: 600;
        }
        .tools-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(370px, 1fr)); 
            gap: 2.5rem; 
        }
        .tool-card { 
            background: var(--card); 
            padding: 2.6rem; 
            border: 1px solid #333; 
            transition: border-color 0.6s ease;
        }
        .tool-card:hover { border-color: var(--gold); }
        .tool-card h3 { 
            color: var(--gold-light); 
            margin-bottom: 1.1rem; 
            font-size: 1.6rem; 
        }
        .category { 
            display: inline-block; 
            background: rgba(212, 175, 55, 0.12); 
            color: var(--gold); 
            padding: 8px 20px; 
            border-radius: 6px; 
            font-size: 0.98rem; 
            margin-bottom: 1.5rem; 
        }

        footer { 
            background: #050505; 
            padding: 4.5rem 6% 3rem; 
            text-align: center; 
            border-top: 1px solid #222; 
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .nav-links a { margin-left: 1.5rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <header>
