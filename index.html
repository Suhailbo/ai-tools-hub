    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --text: #f0f0f0;
            --gold: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Circular Rotating Background */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.06) 0%, transparent 70%);
            overflow: hidden;
            pointer-events: none;
        }

        .background::before,
        .background::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: rotateCircle 140s linear infinite;
        }

        .background::before {
            width: 800px;
            height: 800px;
            animation-duration: 160s;
        }

        .background::after {
            width: 1200px;
            height: 1200px;
            animation-duration: 220s;
            animation-direction: reverse;
        }

        @keyframes rotateCircle {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        header {
            background: rgba(10, 10, 10, 0.95);
            padding: 2rem 6%;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
